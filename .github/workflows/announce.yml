name: 定時公告排程

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      message:
        description: 手動公告內容
        required: true
        default: 手動觸發的公告

jobs:
  announce:
    runs-on: ubuntu-latest
    steps:
      - name: 觸發每日課程提醒檢查
        if: github.event_name == 'schedule'
        run: |
          curl -s -X POST https://ipapalinebot.onrender.com/admin/check-reminders \
            -H "X-Admin-Pass: ${{ secrets.ADMIN_PASSWORD }}" \
            -H "Content-Type: application/json"

      - name: 手動發公告
        if: github.event_name == 'workflow_dispatch'
        run: |
          curl -s -X POST https://ipapalinebot.onrender.com/admin/send \
            -H "X-Admin-Pass: ${{ secrets.ADMIN_PASSWORD }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"📢 ${{ github.event.inputs.message }}\"}"
