name: 定時公告排程

on:
  schedule:
    # 格式：分 時 日 月 週（UTC時間，台灣時間 = UTC+8）
    # 台灣早上 9:00 = UTC 01:00
    - cron: '0 1 * * *'   # 每天早上 09:00（台灣時間）發公告1
    - cron: '0 4 * * 1'   # 每週一下午 12:00（台灣時間）發公告2
    - cron: '30 9 * * *'  # 每天晚上 17:30（台灣時間）發公告3

  # 也可以手動觸發（在 GitHub Actions 頁面按按鈕）
  workflow_dispatch:
    inputs:
      message:
        description: '公告內容'
        required: true
        default: '手動觸發的公告'

jobs:
  send-announcement:
    runs-on: ubuntu-latest
    steps:
      - name: 每天早上公告
        if: github.event.schedule == '0 1 * * *'
        run: |
          curl -X POST https://api.line.me/v2/bot/message/broadcast \
            -H "Authorization: Bearer ${{ secrets.LINE_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "messages": [{
                "type": "flex",
                "altText": "[公告] 早安提醒",
                "contents": {
                  "type": "bubble",
                  "header": {
                    "type": "box",
                    "layout": "vertical",
                    "contents": [{"type": "text", "text": "📢 公告", "weight": "bold", "size": "lg", "color": "#ffffff"}],
                    "backgroundColor": "#06C755",
                    "paddingAll": "16px"
                  },
                  "body": {
                    "type": "box",
                    "layout": "vertical",
                    "contents": [{"type": "text", "text": "早安！今天也請準時上工 ☀️", "wrap": true, "size": "md"}],
                    "paddingAll": "16px"
                  }
                }
              }]
            }'

      - name: 每週一公告
        if: github.event.schedule == '0 4 * * 1'
        run: |
          curl -X POST https://api.line.me/v2/bot/message/broadcast \
            -H "Authorization: Bearer ${{ secrets.LINE_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "messages": [{
                "type": "flex",
                "altText": "[公告] 週一提醒",
                "contents": {
                  "type": "bubble",
                  "header": {
                    "type": "box",
                    "layout": "vertical",
                    "contents": [{"type": "text", "text": "📢 公告", "weight": "bold", "size": "lg", "color": "#ffffff"}],
                    "backgroundColor": "#06C755",
                    "paddingAll": "16px"
                  },
                  "body": {
                    "type": "box",
                    "layout": "vertical",
                    "contents": [{"type": "text", "text": "新的一週開始了！本週目標請確認 💪", "wrap": true, "size": "md"}],
                    "paddingAll": "16px"
                  }
                }
              }]
            }'

      - name: 每天下班公告
        if: github.event.schedule == '30 9 * * *'
        run: |
          curl -X POST https://api.line.me/v2/bot/message/broadcast \
            -H "Authorization: Bearer ${{ secrets.LINE_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "messages": [{
                "type": "flex",
                "altText": "[公告] 下班提醒",
                "contents": {
                  "type": "bubble",
                  "header": {
                    "type": "box",
                    "layout": "vertical",
                    "contents": [{"type": "text", "text": "📢 公告", "weight": "bold", "size": "lg", "color": "#ffffff"}],
                    "backgroundColor": "#06C755",
                    "paddingAll": "16px"
                  },
                  "body": {
                    "type": "box",
                    "layout": "vertical",
                    "contents": [{"type": "text", "text": "今天辛苦了！記得準時下班 🏠", "wrap": true, "size": "md"}],
                    "paddingAll": "16px"
                  }
                }
              }]
            }'

      - name: 手動觸發公告
        if: github.event_name == 'workflow_dispatch'
        run: |
          MESSAGE="${{ github.event.inputs.message }}"
          curl -X POST https://api.line.me/v2/bot/message/broadcast \
            -H "Authorization: Bearer ${{ secrets.LINE_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"messages\": [{
                \"type\": \"flex\",
                \"altText\": \"[公告] ${MESSAGE}\",
                \"contents\": {
                  \"type\": \"bubble\",
                  \"header\": {
                    \"type\": \"box\",
                    \"layout\": \"vertical\",
                    \"contents\": [{\"type\": \"text\", \"text\": \"📢 公告\", \"weight\": \"bold\", \"size\": \"lg\", \"color\": \"#ffffff\"}],
                    \"backgroundColor\": \"#06C755\",
                    \"paddingAll\": \"16px\"
                  },
                  \"body\": {
                    \"type\": \"box\",
                    \"layout\": \"vertical\",
                    \"contents\": [{\"type\": \"text\", \"text\": \"${MESSAGE}\", \"wrap\": true, \"size\": \"md\"}],
                    \"paddingAll\": \"16px\"
                  }
                }
              }]
            }"
